<!DOCTYPE html>
<html>
<head>
    <title>Exercícios JS</title>
</head>
<body>
    <h1>Exercícios JavaScript</h1>

    <h2>Idade</h2>
    <input id="idadeInput" type="number" placeholder="Digite sua idade">
    <button onclick="verificarIdade()">Verificar Idade</button>
    <p id="resultadoIdade"></p>

    <h2>Mês</h2>
    <input id="mesInput" type="number" placeholder="Digite um número de 1 a 12">
    <button onclick="verificarMes()">Verificar Mês</button>
    <p id="resultadoMes"></p>

    <h2>Nota</h2>
    <input id="notaInput" type="number" placeholder="Digite sua nota">
    <button onclick="verificarNota()">Verificar Nota</button>
    <p id="resultadoNota"></p>

    <script src="app.js"></script>
</body>
</html>
